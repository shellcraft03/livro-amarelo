name: Processar vídeos do YouTube

on:
  workflow_dispatch:       # apenas disparo manual

jobs:
  processar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências Python
        run: pip install youtube-transcript-api openai psycopg2-binary pinecone requests

      - name: Curar vídeos
        env:
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          WEBSHARE_PROXY_USERNAME:  ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD:  ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
          SYSTEM_PROMPT_CURADORIA:  ${{ secrets.SYSTEM_PROMPT_CURADORIA }}
        run: python scripts/curate_videos_ci.py

      - name: Indexar vídeos aprovados
        env:
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY:         ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_ENTREVISTAS: ${{ secrets.PINECONE_INDEX_ENTREVISTAS }}
          WEBSHARE_PROXY_USERNAME:  ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD:  ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
        run: python scripts/index_youtube_ci.py
